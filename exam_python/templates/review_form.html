{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">Рецензия на книгу «{{ book.title }}»</h1>

<form method="POST">
    <div class="mb-3">
        <label for="rating" class="form-label">Оценка *</label>
        <select name="rating" id="rating" class="form-select" required>
            <option value="5" selected>5 – отлично</option>
            <option value="4">4 – хорошо</option>
            <option value="3">3 – удовлетворительно</option>
            <option value="2">2 – неудовлетворительно</option>
            <option value="1">1 – плохо</option>
            <option value="0">0 – ужасно</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="review-text" class="form-label">Текст рецензии *</label>
        <textarea name="text" id="review-editor" class="form-control" rows="5" required></textarea>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
        <a href="{{ url_for('view_book', book_id=book.id) }}" class="btn btn-secondary me-md-2">Отмена</a>
        <button type="submit" class="btn btn-primary">Сохранить</button>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
    new EasyMDE({
        element: document.getElementById('review-editor'),
        spellChecker: false
    });
</script>
{% endblock %}
